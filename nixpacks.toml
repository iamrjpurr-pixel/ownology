# Nixpacks build configuration for Railway
# Tells Railway how to build and start Ownology.
# Install pnpm globally to /usr/local so it's on PATH across all build phases.

[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = [
  "npm install -g --prefix /usr/local pnpm@10.4.1",
  "pnpm install --no-frozen-lockfile"
]

[phases.build]
cmds = ["pnpm build"]

[start]
cmd = "pnpm start"

[variables]
NODE_ENV = "production"
