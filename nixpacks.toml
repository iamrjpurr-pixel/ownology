# Nixpacks build configuration for Railway
# Chain everything in single commands so PATH from npm install -g persists.

[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = [
  "npm install -g pnpm@10.4.1 && PNPM_BIN=$(npm root -g)/pnpm/bin/pnpm.cjs && ln -sf $PNPM_BIN /usr/bin/pnpm && pnpm install --no-frozen-lockfile"
]

[phases.build]
cmds = ["pnpm build"]

[start]
cmd = "pnpm start"

[variables]
NODE_ENV = "production"
